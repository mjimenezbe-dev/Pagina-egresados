<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="/iniciar_sesion.css">
</head>
<body>
    <header>
        <section class="logo">
             <img src="imagenes/Captura de pantalla 2026-06-27 175611.png" alt="logo">
        </section>
        <nav>
            <a href="">Inicio</a>
            <a href="">Nosotros</a>
            <a href="">Egresados</a>
            <a href="">Noticias</a>
            <a href="">Eventos</a>
            <a href="">Contacto</a>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <div class="login-content">
                <section class="encabezado">
                    <h1>¡Bienvenido!</h1>
                    <p>Inicia sesión para obtener los beneficios de egresado.</p>
                </section>

                <form class="formulario">
                    <label for="email">Correo Electronico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com">

                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" placeholder="Tu contraseña">

                    <button type="submit">Entrar</button>
                </form>
            </div>

            <div class="imagen-panel">
                <img src="/imagenes/logoGrande.png" alt="Universidad CENFOTEC">
            </div>
        </div>
    </main>

</body>
</html>
